name: Daily Signal Report
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate signal report
        run: |
          date=$(date -u +"%Y-%m-%d_%H-%M")
          echo "# Sentinel Signals Report - $date UTC" > "reports/${date}.md"
          echo "" >> "reports/${date}.md"
          echo "Live scanner: https://darksanctum.github.io/sentinel-signals/scanner.html" >> "reports/${date}.md"
          echo "Telegram bot: https://t.me/Ozymandiasz_bot" >> "reports/${date}.md"
          echo "" >> "reports/${date}.md"
          echo "## Top Solana Signals" >> "reports/${date}.md"
          
          # Fetch trending tokens
          tokens=$(curl -s "https://api.dexscreener.com/token-boosts/latest/v1" | \
            python3 -c "
          import sys,json
          try:
            data=json.load(sys.stdin)
            sol=[t for t in data if t.get('chainId')=='solana'][:5]
            for i,t in enumerate(sol,1):
              print(f'{i}. {t.get(\"tokenAddress\",\"\")} - {t.get(\"description\",t.get(\"url\",\"\"))}')
          except: print('Error fetching data')
          ")
          echo "$tokens" >> "reports/${date}.md"
          
      - name: Commit report
        run: |
          git config user.name "Sentinel Bot"
          git config user.email "bot@sentinel-signals.dev"
          git add reports/ || true
          git commit -m "signal: $(date -u +%Y-%m-%d_%H:%M) report" || true
          git push
